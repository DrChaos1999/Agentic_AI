<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tool-Calling Agent</title>
<style>
  :root{--bg:#0e1512;--accent:#37d49a;--panel:#15201b;--ink:#dcefe6}
  *{box-sizing:border-box}
  body{font:15px/1.55 'Cascadia Code',Consolas,monospace;background:var(--bg);color:var(--ink);max-width:780px;margin:0 auto;padding:30px 18px}
  h1{font-size:1.35rem;color:var(--accent)}
  .bar{display:flex;gap:10px}
  input{flex:1;padding:12px;border-radius:8px;border:1px solid #29473a;background:var(--panel);color:var(--ink);font:inherit}
  button{background:var(--accent);color:#06231a;border:0;border-radius:8px;padding:0 20px;cursor:pointer;font-weight:700}
  button:disabled{opacity:.5}
  .step{background:var(--panel);border-left:3px solid var(--accent);border-radius:6px;padding:10px 14px;margin:10px 0;font-size:13px}
  .step b{color:var(--accent)}
  #answer{background:var(--panel);border-radius:8px;padding:16px;margin-top:16px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>🤖 Tool-Calling Agent</h1>
<p>Try: <em>What's the weather in Tokyo and Dhaka, and what is 18% of 245?</em></p>
<div class="bar">
  <input id="q" placeholder="Ask something needing tools…" onkeydown="if(event.key==='Enter')go()">
  <button id="btn" onclick="go()">Run</button>
</div>
<div id="trace"></div>
<div id="answer"></div>
<script>
async function go(){
  const q=document.getElementById('q').value.trim();if(!q)return;
  const btn=document.getElementById('btn');btn.disabled=true;
  document.getElementById('trace').innerHTML='';
  document.getElementById('answer').textContent='Agent running…';
  const r=await fetch('/api/agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
  const d=await r.json();
  document.getElementById('trace').innerHTML=d.trace.map((t,i)=>
    `<div class="step"><b>step ${i+1} · ${t.tool}</b>(${JSON.stringify(t.input)}) → ${t.output}</div>`).join('');
  document.getElementById('answer').textContent=d.answer;
  btn.disabled=false;
}
</script>
</body>
</html>
